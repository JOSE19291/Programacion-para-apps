<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de IMC</h1>
        
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" placeholder="Ej: 75" step="0.1">

        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" placeholder="Ej: 1.75" step="0.01">

        <button id="btn-calcular">Calcular IMC</button>

        <div id="resultado-contenedor">
            <p>Tu IMC es: <span id="valor-imc">-</span></p>
            <p>Categoría: <span id="categoria-imc">-</span></p>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
